name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Cache VS Code
        uses: actions/cache@v4
        with:
          path: ~/.vscode-test
          key: vscode-test-${{ runner.os }}-${{ runner.arch }}-stable
          restore-keys: |
            vscode-test-${{ runner.os }}-${{ runner.arch }}-
      - name: Lint
        run: npm run lint
      - name: Compile
        run: npm run compile
      - name: Test (Linux)
        run: xvfb-run -a npm test
        if: runner.os == 'Linux'
      - name: Test (non-Linux)
        run: npm test
        if: runner.os != 'Linux'
